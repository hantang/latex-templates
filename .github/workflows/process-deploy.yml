name: Process & Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 10 * * 1"

jobs:
  process:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r src/requirements.txt
      - name: Run Python Scripts
        run: cd src && python run.py --token ${{ secrets.TOKEN }}
      - name: Git auto commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Automated Update repo stats
          commit_options: '--no-verify --signoff'
          file_pattern: 'data/*.json resource/*.json wiki/'

  deploy:
    needs: process
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Dependencies
        run: cd wiki && python -m pip install --upgrade pip && pip install -r requirements-mkdocs.txt
      - name: Build Site
        run: cd wiki && mkdocs build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki/site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
